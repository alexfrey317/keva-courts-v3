<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KEVA Open Courts</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>(function(){var s=localStorage.getItem('keva-theme');var t=s||(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t);document.querySelector('meta[name=theme-color]').content=t==='light'?'#f8fafc':'#0a0e14'})()</script>
<style>
  :root,[data-theme="dark"]{
    --bg:#0a0e14;--text:#c5cdd9;--heading:#e6ecf5;--muted:#4a5568;--dim:#3a4555;--subtle:#2a3444;
    --panel:#111820;--panel-b:#1e2a38;--panel-hover:#1a2332;
    --accent:#3b82f6;--accent-t:#60a5fa;--accent-bg:#0f1d2e;
    --open-t:#4ade80;--open-bg1:#052e16;--open-bg2:#065f30;--open-b:#16a34a;--open-glow:rgba(74,222,128,0.35);
    --booked-bg:#0c1018;--booked-t:#283040;--booked-b:#151c28;
    --full-bg1:#1a1020;--full-bg2:#1e1228;--full-b:#2e1a3e;--full-t:#a78bba;
    --red-bg1:#2a0a0a;--red-bg2:#301010;--red-b:#7f1d1d;--red-t:#fca5a5;
    --cyan-t:#22d3ee;--cyan-bg1:#042f3a;--cyan-bg2:#064a52;--cyan-b:#0e7490;
    --cyan-card1:#081520;--cyan-card2:#0a1e2e;--cyan-t2:#67e8f9;--cyan-dim:#4a7a8a;
    --amber-t:#92400e;--amber-bg:#1a1308;--amber-b:#78350f;
    --my-bg1:#1a0a2e;--my-bg2:#2d1450;--my-b:#7c3aed;--my-t:#c4b5fd;--my-glow:rgba(196,181,253,0.3);
    --warn-bg1:#1a1400;--warn-bg2:#2d2200;--warn-b:#b45309;--warn-t:#fbbf24;--warn-glow:rgba(251,191,36,0.3);
    --grid-bg:#0c1018;--grid-t:#94a3b8;--hdr-t:#64748b;
    --row-dim-t:#2a3444;--row-dim-bg:#0a0d13;--row-dim-ct:#1e2630;--row-dim-b:#10151d;
    --callout-bg:#0a1f12;--callout-b:#166534;
    --mode-g-bg:#0f1d2e;--mode-g-t:#60a5fa;--mode-op-bg:#0c1a20;--mode-op-t:#22d3ee;--mode-my-bg:#1a0a2e;--mode-my-t:#c4b5fd;
    --ws-active-bg:#1a2332;--ws-active-b:#2a3a50;--ws-active-t:#94a3b8;
    --spin-bg:#1e2a38;--spin-t:#3b82f6;--theme-btn-t:#64748b;
    --overlay:rgba(0,0,0,0.75);--picker-bg:#111820;--now-line:#ef4444;
  }
  [data-theme="light"]{
    --bg:#f8fafc;--text:#475569;--heading:#0f172a;--muted:#94a3b8;--dim:#cbd5e1;--subtle:#e2e8f0;
    --panel:#ffffff;--panel-b:#e2e8f0;--panel-hover:#f1f5f9;
    --accent:#2563eb;--accent-t:#2563eb;--accent-bg:#eff6ff;
    --open-t:#16a34a;--open-bg1:#f0fdf4;--open-bg2:#dcfce7;--open-b:#86efac;--open-glow:rgba(22,163,74,0.15);
    --booked-bg:#f1f5f9;--booked-t:#cbd5e1;--booked-b:#e2e8f0;
    --full-bg1:#faf5ff;--full-bg2:#f3e8ff;--full-b:#d8b4fe;--full-t:#7c3aed;
    --red-bg1:#fef2f2;--red-bg2:#fee2e2;--red-b:#fca5a5;--red-t:#dc2626;
    --cyan-t:#0891b2;--cyan-bg1:#ecfeff;--cyan-bg2:#cffafe;--cyan-b:#67e8f9;
    --cyan-card1:#f0fdfa;--cyan-card2:#ecfeff;--cyan-t2:#0e7490;--cyan-dim:#94a3b8;
    --amber-t:#92400e;--amber-bg:#fffbeb;--amber-b:#fcd34d;
    --my-bg1:#f5f3ff;--my-bg2:#ede9fe;--my-b:#a78bfa;--my-t:#6d28d9;--my-glow:rgba(109,40,217,0.12);
    --warn-bg1:#fffbeb;--warn-bg2:#fef3c7;--warn-b:#fcd34d;--warn-t:#b45309;--warn-glow:rgba(180,83,9,0.12);
    --grid-bg:#f8fafc;--grid-t:#64748b;--hdr-t:#94a3b8;
    --row-dim-t:#cbd5e1;--row-dim-bg:#f8fafc;--row-dim-ct:#e2e8f0;--row-dim-b:#f1f5f9;
    --callout-bg:#f0fdf4;--callout-b:#86efac;
    --mode-g-bg:#eff6ff;--mode-g-t:#2563eb;--mode-op-bg:#ecfeff;--mode-op-t:#0891b2;--mode-my-bg:#f5f3ff;--mode-my-t:#6d28d9;
    --ws-active-bg:#f1f5f9;--ws-active-b:#cbd5e1;--ws-active-t:#475569;
    --spin-bg:#e2e8f0;--spin-t:#2563eb;--theme-btn-t:#94a3b8;
    --overlay:rgba(0,0,0,0.4);--picker-bg:#ffffff;--now-line:#dc2626;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;min-height:100dvh;padding:12px;padding-top:max(12px,env(safe-area-inset-top));padding-bottom:max(12px,env(safe-area-inset-bottom));touch-action:manipulation;-webkit-text-size-adjust:100%;transition:background .2s,color .2s;overscroll-behavior-y:contain}
  #root{max-width:540px;margin:0 auto}

  .header{text-align:center;margin-bottom:2px}
  h1{font-size:1.4rem;font-weight:700;color:var(--heading);letter-spacing:1px;text-transform:uppercase}
  .subtitle{text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
  .hdr-btns{display:flex;gap:4px}
  .icon-btn{background:0;border:1px solid var(--panel-b);color:var(--theme-btn-t);width:30px;height:30px;border-radius:6px;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .icon-btn:active{opacity:.7}
  .copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--open-b);color:var(--open-t);padding:8px 20px;border-radius:8px;font-size:.85rem;font-weight:600;z-index:200;animation:fadeout 2s forwards}
  @keyframes fadeout{0%,70%{opacity:1}100%{opacity:0}}

  .mode-toggle{display:flex;background:var(--panel);border:1px solid var(--panel-b);border-radius:10px;padding:3px;margin-bottom:14px}
  .mode-btn{flex:1;padding:10px 4px;border:none;border-radius:8px;background:0;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
  .mode-btn:active{opacity:.8}
  .mode-btn.active-games{background:var(--mode-g-bg);color:var(--mode-g-t)}
  .mode-btn.active-op{background:var(--mode-op-bg);color:var(--mode-op-t)}
  .mode-btn.active-my{background:var(--mode-my-bg);color:var(--mode-my-t)}

  .cal-collapse{text-align:center;margin-bottom:8px}
  .cal-collapse button{background:var(--panel);border:1px solid var(--panel-b);color:var(--muted);padding:6px 16px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;width:100%}
  .cal-collapse button:active{opacity:.7}
  .cal{margin-bottom:16px;background:var(--panel);border:1px solid var(--panel-b);border-radius:12px;padding:12px;overflow:hidden;transition:max-height .3s ease}
  .cal.collapsed{max-height:0;padding:0 12px;border-color:transparent;margin-bottom:0}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cal-nav button{background:0;border:1px solid var(--panel-b);color:var(--hdr-t);width:44px;height:44px;border-radius:10px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .cal-nav button:active{background:var(--panel-hover);color:var(--grid-t)}
  .cal-title{font-size:.95rem;font-weight:700;color:var(--heading)}
  .ws-toggle{display:flex;gap:2px;justify-content:center;margin-bottom:8px}
  .ws-btn{background:0;border:1px solid var(--panel-b);color:var(--dim);padding:3px 10px;border-radius:6px;font-size:.65rem;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
  .ws-btn:active{opacity:.7}
  .ws-btn.active{background:var(--ws-active-bg);border-color:var(--ws-active-b);color:var(--ws-active-t)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-dow{text-align:center;font-size:.7rem;font-weight:700;color:var(--dim);text-transform:uppercase;padding:6px 0}
  .cal-day{position:relative;text-align:center;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:500;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--dim);border:1.5px solid transparent;min-height:40px}
  .cal-day:active{background:var(--panel-hover)}
  .cal-day.vb-day{color:var(--hdr-t);font-weight:600}
  .cal-day.today{border-color:var(--ws-active-b)}
  .cal-day.selected{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-t);font-weight:700}
  .cal-day.past{opacity:.4}.cal-day.overflow{opacity:.35;font-size:.75rem}
  .cal-dots{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
  .cal-dots span{width:5px;height:5px;border-radius:50%;flex-shrink:0}

  /* ---- Day nav bar (swipe + today) ---- */
  .day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .day-nav-btn{background:0;border:1px solid var(--panel-b);color:var(--hdr-t);width:40px;height:40px;border-radius:8px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .day-nav-btn:active{background:var(--panel-hover)}
  .day-nav-btn:disabled{opacity:.3;cursor:default}
  .day-nav-center{text-align:center;flex:1}
  .day-nav-date{font-size:1.1rem;font-weight:600;color:var(--heading)}
  .today-btn{background:0;border:1px solid var(--accent);color:var(--accent-t);padding:3px 10px;border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer;margin-top:2px;text-transform:uppercase}
  .today-btn:active{opacity:.7}
  .today-btn.hidden{visibility:hidden}

  .summary{text-align:center;padding:16px 14px;border-radius:12px;margin-bottom:14px;line-height:1.4}
  .summary .count{font-size:2.2rem;font-weight:800;display:block;line-height:1.1}
  .summary .label{font-size:.95rem}
  .summary.has-open{background:linear-gradient(135deg,var(--open-bg1),var(--open-bg2));border:1px solid var(--open-b);color:var(--open-t)}
  .summary.fully-booked{background:linear-gradient(135deg,var(--full-bg1),var(--full-bg2));border:1px solid var(--full-b);color:var(--full-t)}
  .summary.no-games{background:var(--panel);border:1px solid var(--panel-b);color:var(--muted)}
  .summary.not-scheduled{background:linear-gradient(135deg,var(--red-bg1),var(--red-bg2));border:1px solid var(--red-b);color:var(--red-t)}
  .summary.has-op{background:linear-gradient(135deg,var(--cyan-bg1),var(--cyan-bg2));border:1px solid var(--cyan-b);color:var(--cyan-t)}
  .summary.no-op{background:var(--panel);border:1px solid var(--panel-b);color:var(--muted)}
  .summary.has-my{background:linear-gradient(135deg,var(--my-bg1),var(--my-bg2));border:1px solid var(--my-b);color:var(--my-t)}

  .next-game{background:var(--panel);border:1px solid var(--my-b);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:10px}
  .next-game .ng-badge{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:5px;white-space:nowrap}
  .next-game .ng-detail{flex:1;min-width:0}
  .next-game .ng-vs{font-weight:700;color:var(--heading)}
  .next-game .ng-meta{font-size:.75rem;color:var(--muted)}

  /* ---- Season schedule ---- */
  .sched-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
  .sched-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:var(--panel);border:1px solid var(--panel-b);font-size:.82rem;cursor:pointer;transition:all .1s}
  .sched-row:active{background:var(--panel-hover)}
  .sched-row.past-game{opacity:.5}
  .sched-row .sr-date{font-weight:600;color:var(--grid-t);min-width:80px;font-variant-numeric:tabular-nums}
  .sched-row .sr-vs{flex:1;color:var(--heading);font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sched-row .sr-score{font-weight:700;font-variant-numeric:tabular-nums;min-width:36px;text-align:right}
  .sched-row .sr-w{color:var(--open-t)}.sched-row .sr-l{color:var(--red-t)}
  .sched-toggle{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
  .sched-toggle button{background:var(--panel);border:1px solid var(--panel-b);color:var(--muted);padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer}
  .sched-toggle button:active{opacity:.7}
  .sched-toggle button.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-t)}

  /* ---- Standings ---- */
  .standings{margin-bottom:14px}
  .standings-title{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding:0 4px}
  .standings table{width:100%;border-collapse:collapse;font-size:.8rem}
  .standings th{text-align:left;padding:6px 8px;color:var(--hdr-t);font-weight:700;font-size:.7rem;text-transform:uppercase;border-bottom:1px solid var(--panel-b)}
  .standings td{padding:6px 8px;border-bottom:1px solid var(--panel-b)}
  .standings tr.me td{color:var(--heading);font-weight:700}
  .standings .rank{color:var(--muted);width:24px}
  .standings .rec{text-align:right;font-variant-numeric:tabular-nums;color:var(--grid-t)}

  .grid{display:grid;gap:2px}
  .g-hdr{background:var(--panel);padding:10px 2px;text-align:center;font-weight:700;font-size:.7rem;color:var(--hdr-t);text-transform:uppercase;letter-spacing:.5px;line-height:1.2}
  .g-time{position:relative;padding:14px 4px;font-size:.82rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--grid-t);display:flex;align-items:center;justify-content:center;background:var(--grid-bg);white-space:nowrap}
  .g-cell{padding:14px 4px;text-align:center;font-size:.82rem;font-weight:700;transition:all .15s}
  .g-cell.open{background:linear-gradient(135deg,var(--open-bg1),var(--open-bg2));color:var(--open-t);text-shadow:0 0 10px var(--open-glow);border:1px solid var(--open-b);border-radius:4px}
  .g-cell.open-warn{background:linear-gradient(135deg,var(--warn-bg1),var(--warn-bg2));color:var(--warn-t);text-shadow:0 0 10px var(--warn-glow);border:1px solid var(--warn-b);border-radius:4px;font-size:.72rem;line-height:1.2}
  .g-cell.booked{background:var(--booked-bg);color:var(--booked-t);border:1px solid var(--booked-b);border-radius:4px}
  .g-cell.my-game{border-radius:4px;font-size:.72rem;line-height:1.2}
  .row-full .g-time{color:var(--row-dim-t)}
  .row-full .g-cell.booked{background:var(--row-dim-bg);color:var(--row-dim-ct);border-color:var(--row-dim-b)}
  .g-time.now-slot{color:var(--now-line);font-weight:800}
  .g-time.now-slot::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--now-line);border-radius:2px}

  .callouts{margin-top:14px;display:flex;flex-direction:column;gap:6px}
  .callout{background:var(--callout-bg);border:1px solid var(--callout-b);border-radius:10px;padding:12px 14px;font-size:.9rem;color:var(--open-t);display:flex;align-items:center;gap:10px}
  .callout .dot{width:8px;height:8px;background:var(--open-t);border-radius:50%;box-shadow:0 0 6px var(--open-t);flex-shrink:0}
  .callout-warn{background:var(--warn-bg1);border-color:var(--warn-b);color:var(--warn-t)}
  .callout-warn .dot-warn{background:var(--warn-t);box-shadow:0 0 6px var(--warn-t)}
  .callout-net{font-size:.7rem;opacity:.7;margin-left:4px}

  .op-list{display:flex;flex-direction:column;gap:8px}
  .op-card{background:linear-gradient(135deg,var(--cyan-card1),var(--cyan-card2));border:1px solid var(--cyan-b);border-radius:12px;padding:14px 16px}
  .op-card .op-name{font-size:.95rem;font-weight:700;color:var(--cyan-t);margin-bottom:6px}
  .op-card .op-time{font-size:.88rem;font-weight:600;color:var(--cyan-t2);margin-bottom:2px;font-variant-numeric:tabular-nums}
  .op-card .op-court{font-size:.8rem;color:var(--cyan-dim)}

  .bb-note{text-align:center;font-size:.78rem;color:var(--amber-t);background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:8px;padding:8px 12px;margin-top:12px}
  .grid-legend{display:flex;gap:12px;justify-content:center;margin-top:10px;font-size:.7rem;color:var(--muted)}
  .grid-legend span{display:flex;align-items:center;gap:4px}
  .legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
  .legend-dot.green{background:var(--open-t)}.legend-dot.yellow{background:var(--warn-t)}.legend-dot.dim{background:var(--booked-t)}
  .status{text-align:center;font-size:.75rem;color:var(--subtle);margin-top:20px;padding-bottom:12px}
  .status.error{color:var(--red-t)}
  .loading-wrap{text-align:center;padding:48px 0;color:var(--muted);font-size:.9rem;grid-column:1/-1}
  .spinner{display:inline-block;width:22px;height:22px;border:2.5px solid var(--spin-bg);border-top-color:var(--spin-t);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .team-banner{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--my-b);border-radius:10px;padding:10px 14px;margin-bottom:14px}
  .team-banner .tb-info{flex:1;min-width:0}
  .team-banner .tb-name{font-size:.85rem;font-weight:700;color:var(--my-t)}
  .team-banner .tb-league{font-size:.7rem;color:var(--muted);margin-left:4px}
  .team-banner .tb-info>div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-banner .tb-info>div+div{margin-top:4px}
  .team-banner .tb-change{background:0;border:1px solid var(--panel-b);color:var(--muted);padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;white-space:nowrap;margin-left:10px}
  .team-banner .tb-change:active{opacity:.7}
  .team-banner .tb-record{font-size:.7rem;color:var(--muted);margin-left:6px;font-weight:600}

  .picker-overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
  .picker-modal{background:var(--picker-bg);border:1px solid var(--panel-b);border-radius:16px 16px 0 0;width:100%;max-width:540px;max-height:85vh;display:flex;flex-direction:column}
  .picker-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--panel-b);flex-shrink:0}
  .picker-header h2{font-size:1rem;font-weight:700;color:var(--heading)}
  .picker-done{background:linear-gradient(135deg,var(--my-bg1),var(--my-bg2));border:1px solid var(--my-b);color:var(--my-t);padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
  .picker-done:active{opacity:.8}
  .picker-search{width:100%;padding:10px 14px;border:1px solid var(--panel-b);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9rem;margin:12px 16px 4px;box-sizing:border-box;outline:none}
  .picker-search:focus{border-color:var(--accent)}
  .picker-search::placeholder{color:var(--dim)}
  .picker-list{overflow-y:auto;padding:8px 16px 24px;-webkit-overflow-scrolling:touch}
  .picker-league-name{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:16px 0 6px;border-bottom:1px solid var(--panel-b);margin-bottom:4px}
  .picker-team{padding:12px;border-radius:8px;cursor:pointer;color:var(--text);font-size:.9rem;font-weight:500;transition:all .1s}
  .picker-team:active{background:var(--panel-hover)}
  .picker-team.sel{background:var(--mode-my-bg);color:var(--my-t);font-weight:700}

  .select-prompt{text-align:center;padding:32px 16px}
  .select-prompt p{color:var(--muted);font-size:.9rem;margin-bottom:14px}
  .show-open-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
  .show-open-toggle button{background:var(--panel);border:1px solid var(--panel-b);color:var(--muted);padding:6px 14px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
  .show-open-toggle button:disabled{opacity:.55;cursor:default}
  .show-open-toggle button:active{opacity:.7}
  .show-open-toggle button.on{background:var(--open-bg1);border-color:var(--open-b);color:var(--open-t)}
  .select-btn{background:linear-gradient(135deg,var(--my-bg1),var(--my-bg2));border:1px solid var(--my-b);color:var(--my-t);padding:14px 28px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer}
  .select-btn:active{opacity:.8}

  /* ---- Pull to refresh ---- */
  .ptr-indicator{text-align:center;color:var(--muted);font-size:.8rem;padding:8px 0;transition:all .2s}

  .swipe-area{touch-action:pan-y}

  .court-map{background:var(--panel);border:1px solid var(--panel-b);border-radius:12px;padding:14px;margin-bottom:14px}
  .court-map .cm-title{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;text-align:center}
  .court-map svg{width:100%;height:auto;display:block}
  .court-map text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  .cm-toggle{text-align:center;margin-bottom:10px}
  .cm-toggle button{background:0;border:1px solid var(--panel-b);color:var(--muted);padding:4px 12px;border-radius:6px;font-size:.7rem;font-weight:600;cursor:pointer}
  .cm-toggle button:active{opacity:.7}

  @media(max-width:374px){body{padding:8px}h1{font-size:1.1rem;letter-spacing:0}.cal{padding:8px}.cal-day{min-height:36px;font-size:.78rem}.g-hdr{font-size:.62rem;padding:8px 1px;letter-spacing:0}.g-time,.g-cell{font-size:.75rem;padding:12px 2px}.callout{font-size:.82rem;padding:10px 12px}.summary .count{font-size:1.8rem}.mode-btn{font-size:.75rem;padding:8px 4px}.icon-btn{width:28px;height:28px;font-size:.85rem}.day-nav-btn{width:36px;height:36px;font-size:.9rem}}
  @media(min-width:375px)and (max-width:430px){.g-hdr{font-size:.68rem}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

const API='https://apps.daysmartrecreation.com/dash/jsonapi/api/v1';
const CO='keva';const VB_RES=[3,4,5];
const WKDAY_SLOTS=['18:00','18:50','19:40','20:30','21:20','22:10'];
const SUN_SLOTS=['15:00','15:50','16:40','17:30','18:20','19:10','20:00','20:50','21:40'];
const VB_DAYS=new Set([0,2,3,4]);const VB_ARR=[0,2,3,4];
const DAYF=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['S','M','T','W','T','F','S'];
const WS_OPTS=[{value:0,label:'Sun'},{value:1,label:'Mon'},{value:6,label:'Sat'}];
const REFRESH_MS=3*60*1000;

function pref(k,d){try{const v=localStorage.getItem(k);return v!==null?v:d}catch{return d}}
function spref(k,v){try{localStorage.setItem(k,v)}catch{}}

const TC=[
  ['#c4b5fd','#1a0a2e','#2d1450','#7c3aed','#6d28d9','#f5f3ff','#ede9fe','#a78bfa'],
  ['#f9a8d4','#2e0a1a','#4a1030','#db2777','#db2777','#fdf2f8','#fce7f3','#f9a8d4'],
  ['#fdba74','#2e1a00','#4a2a00','#ea580c','#ea580c','#fff7ed','#ffedd5','#fdba74'],
  ['#5eead4','#042f2e','#0a4a48','#0d9488','#0d9488','#f0fdfa','#ccfbf1','#5eead4'],
  ['#93c5fd','#0a1a2e','#102a50','#2563eb','#2563eb','#eff6ff','#dbeafe','#93c5fd'],
  ['#fda4af','#2e0a10','#4a1020','#e11d48','#e11d48','#fff1f2','#ffe4e6','#fda4af'],
];
function tc(idx,theme){const c=TC[idx%TC.length];const d=theme==='dark';return{t:c[d?0:4],bg1:c[d?1:5],bg2:c[d?2:6],b:c[d?3:7]}}

async function apiFetch(ep,params={}){const u=new URL(API+'/'+ep);u.searchParams.set('company',CO);for(const[k,v]of Object.entries(params))u.searchParams.set(k,v);const r=await fetch(u,{headers:{Accept:'application/vnd.api+json'}});if(!r.ok)throw new Error('API '+r.status);return r.json()}
async function fetchGames(d){return(await apiFetch('events',{'filter[start_date]':d,'filter[event_type_id]':'g',sort:'start','page[size]':'500'})).data||[]}
async function fetchAllDayEvents(d){return(await apiFetch('events',{'filter[start_date]':d,sort:'start','page[size]':'500'})).data||[]}
function parseGames(raw){return raw.filter(e=>{const a=e.attributes;return VB_RES.includes(a.resource_id)&&!(a.resource_id===3&&!a.resource_area_id)}).map(e=>{const a=e.attributes;return{res:a.resource_id,area:a.resource_area_id||0,start:a.start.slice(11,16),end:a.end.slice(11,16),ht:a.hteam_id,vt:a.vteam_id,hs:a.home_score,vs:a.visiting_score,date:a.start.slice(0,10)}})}
function computeVbStart(allEvents,courts){const earliest={};const seen=new Set();for(const c of courts){if(seen.has(c.res))continue;seen.add(c.res);let min=Infinity;for(const e of allEvents){const a=e.attributes;if(a.resource_id!==c.res)continue;const d=(a.desc||'').toLowerCase();const isVb=d.includes('vb')||d.includes('volleyball')||(a.event_type_id==='g'&&VB_RES.includes(a.resource_id)&&(a.resource_id!==3||a.resource_area_id));if(isVb){const t=mins(a.start.slice(11,16));if(t<min)min=t}}earliest[c.res]=min===Infinity?-1:min}return earliest}

async function fetchAllOpenPlay(){const all=[];let pg=1;while(true){const b=await apiFetch('events',{'filter[event_type_id]':'14',sort:'start','page[size]':'100','page[number]':pg});all.push(...(b.data||[]));const m=b.meta?.page||{};if((m['current-page']||1)>=(m['last-page']||1))break;pg++}return all.filter(e=>/vb|volleyball/i.test(e.attributes.desc||'')).map(e=>{const a=e.attributes;return{date:a.start.slice(0,10),start:a.start.slice(11,16),end:a.end.slice(11,16),desc:a.desc,res:a.resource_id}})}

async function fetchTeamData(){
  const sb=await apiFetch('seasons',{sort:'-id','page[size]':'50'});const today=ds(new Date());let season=null;
  for(const s of sb.data||[]){const n=s.attributes.name.toLowerCase();if(!n.includes('vb adult'))continue;if(n.includes('sand'))continue;const st=s.attributes.start_date?.slice(0,10),en=s.attributes.end_date?.slice(0,10);if(st&&en&&st<=today&&today<=en){season=s;break}}
  if(!season)for(const s of sb.data||[]){const n=s.attributes.name.toLowerCase();if(n.includes('vb adult')&&!n.includes('sand')){season=s;break}}
  if(!season)return{leagues:[],teams:[],teamMap:{}};
  const lb=await apiFetch('leagues',{'filter[season_id]':season.id,'page[size]':'100'});const skip=/waitlist|sub list|canceled/i;
  const leagues=(lb.data||[]).filter(l=>!skip.test(l.attributes.name)).map(l=>({id:l.id,name:l.attributes.name}));
  const teamsByLeague=await Promise.all(leagues.map(async lg=>{const tb=await apiFetch('teams',{'filter[league_id]':lg.id,'page[size]':'100'});return(tb.data||[]).map(t=>({id:Number(t.id),name:t.attributes.name,leagueId:lg.id,leagueName:lg.name}))}));
  const teams=teamsByLeague.flat();const teamMap={};for(const t of teams)teamMap[t.id]=t;
  const isEpic=n=>/epic/i.test(n)?0:1;const lvl=n=>{const nl=n.toLowerCase();if(nl.includes('upper'))return 0;if(nl.includes('high int')||nl.includes('high-int'))return 1;if(nl.includes('intermediate')||nl.includes(' int'))return 2;if(nl.includes('rec'))return 3;return 1.5};
  const dayOrder=n=>{const d=parseDayFromLeague(n);return d<0?99:([2,3,4,0,5,6,1][d]||99)};
  leagues.sort((a,b)=>isEpic(a.name)-isEpic(b.name)||lvl(a.name)-lvl(b.name)||dayOrder(a.name)-dayOrder(b.name));
  return{leagues,teams,teamMap,seasonStart:season.attributes.start_date?.slice(0,10),seasonEnd:season.attributes.end_date?.slice(0,10)}}

// Fetch all VB games for the season (for standings/schedule)
async function fetchAllSeasonGames(){
  // First page to get total, then fetch remaining in parallel
  const b1=await apiFetch('events',{'filter[event_type_id]':'g',sort:'start','page[size]':'2000','page[number]':'1'});
  const all=[...(b1.data||[])];const pages=b1.meta?.page?.['last-page']||1;
  if(pages>1){const rest=await Promise.all(Array.from({length:pages-1},(_,i)=>apiFetch('events',{'filter[event_type_id]':'g',sort:'start','page[size]':'2000','page[number]':String(i+2)})));for(const b of rest)all.push(...(b.data||[]))}
  return parseGames(all)}

function courtName(r,a){return r===5?'Court 1':r===4?'Court 2':r===3&&a===51?'Ct 3 East':r===3&&a===52?'Ct 3 West':r===3?'Court 3':'Court ?'}
function simpleCourtName(r){return r===5?'Court 1':r===4?'Court 2':r===3?'Court 3':'Court ?'}
function discoverCourts(games){const m=new Map();for(const g of games){const k=g.res+'-'+g.area;if(!m.has(k))m.set(k,{res:g.res,area:g.area,key:k})}const l=[...m.values()].sort((a,b)=>a.res!==b.res?b.res-a.res:a.area-b.area);for(const c of l)c.name=courtName(c.res,c.area);return l}
function mins(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function buildGrid(games,courts,slots,myTeamIds){
  const ids=myTeamIds||new Set();const rows=[];let openTotal=0;
  for(const s of slots){const sm=mins(s);const cells=courts.map(c=>{const g=games.find(g=>g.res===c.res&&g.area===c.area&&mins(g.start)<=sm&&sm<mins(g.end));const booked=!!g;const myGame=booked&&ids.size>0&&(ids.has(g.ht)||ids.has(g.vt));const myTid=myGame?(ids.has(g.ht)?g.ht:g.vt):null;const oppId=myGame?(myTid===g.ht?g.vt:g.ht):null;const score=g&&g.hs!=null?{h:g.hs,v:g.vs,myIsHome:myTid===g.ht}:null;if(!booked)openTotal++;return{court:c.name,booked,myGame,myTid,oppId,score}});rows.push({time:s,cells,allBooked:cells.every(c=>c.booked)})}
  return{rows,openTotal}}

function ds(d){return d.toISOString().slice(0,10)}
function fmt12(t){const[h,m]=t.split(':').map(Number);return(h>12?h-12:h)+':'+String(m).padStart(2,'0')+(h>=12?'p':'a')}
function fmtShort(s){const d=new Date(s+'T12:00:00');return MON[d.getMonth()]+' '+d.getDate()}
function getDefaultDate(){const t=new Date();if(VB_DAYS.has(t.getDay()))return ds(t);for(let i=1;i<=7;i++){const n=new Date(t);n.setDate(t.getDate()+i);if(VB_DAYS.has(n.getDay()))return ds(n)}return ds(t)}
function nextVbDay(dateStr,dir){const d=new Date(dateStr+'T12:00:00');for(let i=0;i<60;i++){d.setDate(d.getDate()+dir);if(VB_DAYS.has(d.getDay()))return ds(d)}return dateStr}
function calendarDays(yr,mo,ws){const today=ds(new Date());function mc(dt,ov){const s=ds(dt);return{day:dt.getDate(),str:s,overflow:ov,isVb:VB_DAYS.has(dt.getDay()),isToday:s===today,isPast:s<today}}const f=new Date(yr,mo,1),sd=(f.getDay()-ws+7)%7,dim=new Date(yr,mo+1,0).getDate(),cells=[];for(let i=sd-1;i>=0;i--)cells.push(mc(new Date(yr,mo,-i),true));for(let d=1;d<=dim;d++)cells.push(mc(new Date(yr,mo,d),false));const rem=cells.length%7;if(rem>0)for(let d=1;d<=7-rem;d++)cells.push(mc(new Date(yr,mo+1,d),true));return cells}
function dowHdrs(ws){const h=[];for(let i=0;i<7;i++)h.push(DOW[(ws+i)%7]);return h}
function formatDate(s){const d=new Date(s+'T12:00:00');return DAYF[d.getDay()]+', '+MON[d.getMonth()]+' '+d.getDate()}
function parseDayFromLeague(name){const n=name.toLowerCase();for(const[d,i]of[['sunday',0],['monday',1],['tuesday',2],['wednesday',3],['thursday',4],['friday',5],['saturday',6]])if(n.includes(d))return i;for(const[d,i]of[['sun',0],['mon',1],['tues',2],['tue',2],['wed',3],['thurs',4],['thu',4],['fri',5],['sat',6]])if(n.includes(d))return i;return-1}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes()}
function isToday(dateStr){return dateStr===ds(new Date())}
async function fetchDayOpenCount(d){const raw=await fetchGames(d);const g=parseGames(raw);const c=discoverCourts(g);if(!c.length)return -1;const dow=new Date(d+'T12:00:00').getDay();return buildGrid(g,c,dow===0?SUN_SLOTS:WKDAY_SLOTS).openTotal}

function computeRecord(games,teamId){let w=0,l=0;for(const g of games){if(g.hs==null)continue;const isH=g.ht===teamId;const isA=g.vt===teamId;if(!isH&&!isA)continue;const my=isH?g.hs:g.vs;const th=isH?g.vs:g.hs;if(my>th)w++;else if(th>my)l++}return{w,l}}

function computeStandings(allGames,teamMap,leagueId){
  const teams={};
  for(const g of allGames){if(g.hs==null)continue;
    for(const tid of[g.ht,g.vt]){const t=teamMap[tid];if(!t||t.leagueId!=leagueId)continue;
      if(!teams[tid])teams[tid]={id:tid,name:t.name,w:0,l:0};
      const isH=tid===g.ht;const my=isH?g.hs:g.vs;const th=isH?g.vs:g.hs;
      if(my>th)teams[tid].w++;else if(th>my)teams[tid].l++}}
  return Object.values(teams).sort((a,b)=>(b.w-b.l)-(a.w-a.l)||b.w-a.w)}

/* ---- Swipe hook ---- */
function useSwipe(onLeft,onRight){
  const ref=useRef(null);const startX=useRef(0);const startY=useRef(0);
  useEffect(()=>{const el=ref.current;if(!el)return;
    function ts(e){startX.current=e.touches[0].clientX;startY.current=e.touches[0].clientY}
    function te(e){const dx=e.changedTouches[0].clientX-startX.current;const dy=e.changedTouches[0].clientY-startY.current;
      if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0)onLeft();else onRight()}}
    el.addEventListener('touchstart',ts,{passive:true});el.addEventListener('touchend',te,{passive:true});
    return()=>{el.removeEventListener('touchstart',ts);el.removeEventListener('touchend',te)}},[onLeft,onRight]);
  return ref}

/* ============ Components ============ */
function ModeToggle({mode,onChange}){return(
  <div className="mode-toggle">
    <button className={'mode-btn'+(mode==='games'?' active-games':'')} onClick={()=>onChange('games')}>Games</button>
    <button className={'mode-btn'+(mode==='openplay'?' active-op':'')} onClick={()=>onChange('openplay')}>Open Play</button>
    <button className={'mode-btn'+(mode==='myteam'?' active-my':'')} onClick={()=>onChange('myteam')}>My Team(s)</button>
    <button className={'mode-btn'+(mode==='season'?' active-my':'')} onClick={()=>onChange('season')}>Season</button>
  </div>)}

function Calendar({selected,onSelect,getDots,weekStart,onWeekStartChange,viewYear,viewMonth,onViewChange}){
  const cells=useMemo(()=>calendarDays(viewYear,viewMonth,weekStart),[viewYear,viewMonth,weekStart]);
  const hdrs=useMemo(()=>dowHdrs(weekStart),[weekStart]);
  const prev=()=>onViewChange(viewMonth===0?viewYear-1:viewYear,viewMonth===0?11:viewMonth-1);
  const next=()=>onViewChange(viewMonth===11?viewYear+1:viewYear,viewMonth===11?0:viewMonth+1);
  return(<div className="cal"><div className="cal-nav"><button onClick={prev}>&lsaquo;</button><span className="cal-title">{MON[viewMonth]} {viewYear}</span><button onClick={next}>&rsaquo;</button></div>
    <div className="ws-toggle">{WS_OPTS.map(o=><button key={o.value} className={'ws-btn'+(weekStart===o.value?' active':'')} onClick={()=>onWeekStartChange(o.value)}>{o.label}</button>)}</div>
    <div className="cal-grid">{hdrs.map((d,i)=><div key={i} className="cal-dow">{d}</div>)}
    {cells.map((c,i)=>{let cls='cal-day';if(c.overflow)cls+=' overflow';if(c.isVb)cls+=' vb-day';if(c.isToday)cls+=' today';if(c.isPast)cls+=' past';if(c.str===selected)cls+=' selected';const dots=getDots(c.str);
      return<div key={c.str+i} className={cls} onClick={()=>onSelect(c.str)}>{c.day}{dots.length>0&&<div className="cal-dots">{dots.map((clr,j)=><span key={j} style={{background:clr,boxShadow:'0 0 4px '+clr}}/>)}</div>}</div>})}</div></div>)}

function DayNav({dateStr,onDateChange}){
  const goPrev=useCallback(()=>onDateChange(nextVbDay(dateStr,-1)),[dateStr,onDateChange]);
  const goNext=useCallback(()=>onDateChange(nextVbDay(dateStr,1)),[dateStr,onDateChange]);
  const goToday=useCallback(()=>onDateChange(getDefaultDate()),[onDateChange]);
  const swipeRef=useSwipe(goNext,goPrev);
  const todayStr=ds(new Date());const showToday=dateStr!==todayStr&&dateStr!==getDefaultDate();
  return(<div className="day-nav" ref={swipeRef}>
    <button className="day-nav-btn" onClick={goPrev}>&lsaquo;</button>
    <div className="day-nav-center"><div className="day-nav-date">{formatDate(dateStr)}</div>
      <button className={'today-btn'+(showToday?'':' hidden')} onClick={goToday}>Today</button></div>
    <button className="day-nav-btn" onClick={goNext}>&rsaquo;</button>
  </div>)}

function Summary({openTotal,hasCourts,isVbDay}){
  if(!isVbDay)return<div className="summary not-scheduled"><span className="count">Not a volleyball night</span></div>;
  if(!hasCourts)return<div className="summary not-scheduled"><span className="count">Not yet scheduled</span><span className="label">Games haven't been posted for this date</span></div>;
  if(openTotal===0)return<div className="summary fully-booked"><span className="count">Fully booked</span></div>;
  return<div className="summary has-open"><span className="count">{openTotal}</span><span className="label">open slot{openTotal!==1?'s':''}</span></div>}

function ScheduleGrid({grid,courts,teamMap,hideOpen,vbStart,teamColors,theme,showNow,dateStr,rawGames,allTeamMap}){
  if(!courts.length)return null;
  let hasWarn=false;const now=showNow&&isToday(dateStr)?nowMins():-1;
  return(<>
    <div className="grid" style={{gridTemplateColumns:'minmax(52px,64px) repeat('+courts.length+',1fr)'}}>
    <div className="g-hdr"/>{courts.map(c=><div key={c.key} className="g-hdr">{c.name}</div>)}
    {grid.rows.map(row=>{const rc=row.allBooked?' row-full':'';const slotMin=mins(row.time);const slotEnd=slotMin+50;const isNow=now>=slotMin&&now<slotEnd;
      return<React.Fragment key={row.time}>
      <div className={'g-time'+rc+(isNow?' now-slot':'')}>{fmt12(row.time)}</div>
      {row.cells.map((cell,i)=>{
        if(cell.myGame){const my=cell.myTid&&teamMap?.[cell.myTid]?.name;const opp=cell.oppId&&teamMap?.[cell.oppId]?.name;
          const ci=teamColors?.get(cell.myTid);const cc=ci!==undefined?tc(ci,theme):null;
          const st=cc?{background:`linear-gradient(135deg,${cc.bg1},${cc.bg2})`,color:cc.t,border:`1px solid ${cc.b}`,textShadow:`0 0 10px ${cc.t}33`}:{};
          const sc=cell.score;const scoreStr=sc?` (${sc.myIsHome?sc.h:sc.v}-${sc.myIsHome?sc.v:sc.h})`:'';
          return<div key={i} className="g-cell my-game" style={st}>{my&&<>{my}<br/></>}{opp?<>vs {opp}{scoreStr}</>:'YOUR GAME'}</div>}
        if(!cell.booked&&hideOpen)return<div key={i} className="g-cell booked">{'\u2014'}</div>;
        if(!cell.booked){const es=vbStart&&courts[i]?vbStart[courts[i].res]:-1;const netUp=es>=0&&es<=slotMin;if(!netUp)hasWarn=true;
          return<div key={i} className={'g-cell '+(netUp?'open':'open-warn')}>{netUp?'OPEN':<>OPEN<br/>net?</>}</div>}
        {// Booked cell - show team names if available
        const gm=rawGames&&courts[i]?rawGames.find(g=>g.res===courts[i].res&&g.area===courts[i].area&&mins(g.start)<=slotMin&&slotMin<mins(g.end)):null;
        const tn=gm&&allTeamMap?(allTeamMap[gm.ht]?.name||''):'';
        return<div key={i} className={'g-cell booked'+rc} title={tn}>{tn?<span style={{fontSize:'.65rem',lineHeight:'1.1',opacity:.6}}>{tn}</span>:'\u2014'}</div>}})}
    </React.Fragment>})}</div>
    {hasWarn&&!hideOpen&&<div className="grid-legend"><span><span className="legend-dot green"/>Net likely up</span><span><span className="legend-dot yellow"/>Net uncertain</span></div>}
  </>)}

function Callouts({grid,courts,vbStart}){const o=[];for(const r of grid.rows){const sm=mins(r.time);for(let i=0;i<r.cells.length;i++){const c=r.cells[i];if(!c.booked){const es=vbStart&&courts[i]?vbStart[courts[i].res]:-1;const netUp=es>=0&&es<=sm;o.push({text:c.court+' at '+fmt12(r.time),warn:!netUp})}}}if(!o.length||o.length>8)return null;return<div className="callouts">{o.map((c,i)=><div key={i} className={'callout'+(c.warn?' callout-warn':'')}><span className={'dot'+(c.warn?' dot-warn':'')}/>{c.text}{c.warn&&<span className="callout-net">net?</span>}</div>)}</div>}

function OpenPlayView({sessions}){if(!sessions.length)return<div className="summary no-op">No open play scheduled for this date</div>;return<><div className="summary has-op"><span className="count">{sessions.length}</span><span className="label">open play session{sessions.length!==1?'s':''}</span></div><div className="op-list">{sessions.map((s,i)=><div key={i} className="op-card"><div className="op-name">{s.desc}</div><div className="op-time">{fmt12(s.start)} &ndash; {fmt12(s.end)}</div><div className="op-court">{simpleCourtName(s.res)}</div></div>)}</div></>}

function NextGameCard({myTeamDateMap,teamColorMap,teamMap,theme,dateStr,onGo}){
  const next=useMemo(()=>{const today=ds(new Date());const entries=[...myTeamDateMap.entries()].filter(([d])=>d>=today).sort((a,b)=>a[0].localeCompare(b[0]));for(const[d,tids]of entries){for(const tid of tids)return{date:d,tid}}return null},[myTeamDateMap]);
  if(!next||next.date===dateStr)return null;const t=teamMap?.[next.tid];if(!t)return null;
  const ci=teamColorMap.get(next.tid);const cc=ci!==undefined?tc(ci,theme):null;
  return(<div className="next-game" style={{cursor:'pointer'}} onClick={()=>onGo(next.date)}><span className="ng-badge" style={cc?{background:cc.bg2,color:cc.t,border:`1px solid ${cc.b}`}:{}}>Next</span><div className="ng-detail"><div className="ng-vs">{t.name}</div><div className="ng-meta">{formatDate(next.date)} &rarr;</div></div></div>)}

function SeasonSchedule({allGames,myTeamIds,teamMap,teamColorMap,theme,onDateChange}){
  const[view,setView]=useState('upcoming');
  const[sortBy,setSortBy]=useState('date');
  const today=ds(new Date());
  const games=useMemo(()=>{
    const matched=[];for(const g of allGames){const isH=myTeamIds.has(g.ht);const isA=myTeamIds.has(g.vt);if(!isH&&!isA)continue;
      const myTid=isH?g.ht:g.vt;const oppId=isH?g.vt:g.ht;
      const won=g.hs!=null?(isH?g.hs>g.vs:g.vs>g.hs):null;
      matched.push({date:g.date,time:g.start,myTid,oppId,won,hs:g.hs,vs:g.vs,isHome:isH})}
    matched.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));return matched},[allGames,myTeamIds]);
  const filtered=useMemo(()=>{
    const list=view==='upcoming'?games.filter(g=>g.date>=today):games.filter(g=>g.date<today).reverse();
    if(sortBy==='team'){const copy=[...list];copy.sort((a,b)=>{const an=teamMap[a.myTid]?.name||'';const bn=teamMap[b.myTid]?.name||'';return an.localeCompare(bn)||a.date.localeCompare(b.date)});return copy}
    return list},[games,view,sortBy,today,teamMap]);
  // Group by team when sorted by team
  const grouped=sortBy==='team';
  let lastTid=null;
  return(<>
    <div className="sched-toggle">
      <button className={view==='upcoming'?'active':''} onClick={()=>setView('upcoming')}>Upcoming</button>
      <button className={view==='past'?'active':''} onClick={()=>setView('past')}>Past</button>
      <button className={sortBy==='date'?'active':''} onClick={()=>setSortBy('date')}>By Date</button>
      <button className={sortBy==='team'?'active':''} onClick={()=>setSortBy('team')}>By Team</button>
    </div>
    {filtered.length===0&&<div className="summary no-games">{view==='upcoming'?'No upcoming games':'No past games'}</div>}
    <div className="sched-list">{filtered.map((g,i)=>{
      const ci=teamColorMap.get(g.myTid);const cc=ci!==undefined?tc(ci,theme):null;
      const opp=teamMap[g.oppId]?.name||'TBD';
      const myName=teamMap[g.myTid]?.name||'';
      const showHeader=grouped&&g.myTid!==lastTid;lastTid=g.myTid;
      return<React.Fragment key={i}>
        {showHeader&&<div className="picker-league-name" style={cc?{color:cc.t,borderColor:cc.b}:{}}>{myName}</div>}
        <div className={'sched-row'+(g.date<today?' past-game':'')} onClick={()=>onDateChange(g.date)} style={cc?{borderColor:cc.b}:{}}>
        <span className="sr-date">{fmtShort(g.date)} {fmt12(g.time)}</span>
        <span className="sr-vs">vs {opp}</span>
        {g.hs!=null&&<span className={'sr-score '+(g.won?'sr-w':'sr-l')}>{g.isHome?g.hs:g.vs}-{g.isHome?g.vs:g.hs}</span>}
      </div></React.Fragment>})}</div>
  </>)}

function StandingsView({allGames,teamMap,myTeamObjs,myTeamIds}){
  const leagueIds=useMemo(()=>[...new Set(myTeamObjs.map(t=>t.leagueId))],[myTeamObjs]);
  return<>{leagueIds.map(lid=>{const lg=myTeamObjs.find(t=>t.leagueId===lid);const rows=computeStandings(allGames,teamMap,lid);
    return<div key={lid} className="standings"><div className="standings-title">{lg?.leagueName||'League'}</div>
      <table><thead><tr><th className="rank">#</th><th>Team</th><th className="rec">Record</th></tr></thead>
      <tbody>{rows.map((r,i)=><tr key={r.id} className={myTeamIds.has(r.id)?'me':''}>
        <td className="rank">{i+1}</td><td>{r.name}</td><td className="rec">{r.w}-{r.l}</td></tr>)}</tbody></table></div>})}</>}

function TeamPicker({leagues,teams,selectedIds,onDone,onClose}){
  const[sel,setSel]=useState(()=>new Set(selectedIds));
  const[q,setQ]=useState('');
  const grouped=useMemo(()=>{const m=new Map();for(const lg of leagues)m.set(lg.id,[]);for(const t of teams){const a=m.get(t.leagueId);if(a)a.push(t)}for(const[,arr]of m)arr.sort((a,b)=>a.name.localeCompare(b.name));return m},[leagues,teams]);
  const filtered=useMemo(()=>{if(!q.trim())return null;const ql=q.toLowerCase();return teams.filter(t=>t.name.toLowerCase().includes(ql)||t.leagueName.toLowerCase().includes(ql))},[q,teams]);
  function toggle(id){setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n})}
  function done(){onDone([...sel]);onClose()}
  return(<div className="picker-overlay" onClick={e=>{if(e.target===e.currentTarget)done()}}>
    <div className="picker-modal"><div className="picker-header"><h2>Select Your Teams</h2><button className="picker-done" onClick={done}>Done{sel.size>0&&` (${sel.size})`}</button></div>
    <input className="picker-search" placeholder="Search teams..." value={q} onChange={e=>setQ(e.target.value)} autoFocus/>
    <div className="picker-list">
    {filtered?filtered.map(tm=><div key={tm.id} className={'picker-team'+(sel.has(tm.id)?' sel':'')} onClick={()=>toggle(tm.id)}>{sel.has(tm.id)?'\u2713 ':''}{tm.name} <span style={{fontSize:'.7rem',color:'var(--muted)'}}>{tm.leagueName}</span></div>)
    :leagues.map(lg=>{const t=grouped.get(lg.id)||[];if(!t.length)return null;return<div key={lg.id}><div className="picker-league-name">{lg.name}</div>
      {t.map(tm=><div key={tm.id} className={'picker-team'+(sel.has(tm.id)?' sel':'')} onClick={()=>toggle(tm.id)}>{sel.has(tm.id)?'\u2713 ':''}{tm.name}</div>)}</div>})}
    </div></div></div>)}

/* ============ App ============ */
function App(){
  const[dateStr,setDateStr]=useState(getDefaultDate);
  const[mode,setModeRaw]=useState(()=>pref('keva-tab','games'));
  function setMode(m){setModeRaw(m);spref('keva-tab',m)}
  const[calOpen,setCalOpen]=useState(false);
  const[weekStart,setWeekStart]=useState(()=>Number(pref('keva-ws','0')));
  const[theme,setTheme]=useState(()=>{const s=pref('keva-theme',null);return s||(window.matchMedia?.('(prefers-color-scheme:light)').matches?'light':'dark')});
  const[gameState,setGameState]=useState({status:'loading'});
  const[copied,setCopied]=useState(false);
  const refreshRef=useRef(0);

  const initD=new Date(getDefaultDate()+'T12:00:00');
  const[calYear,setCalYear]=useState(initD.getFullYear());
  const[calMonth,setCalMonth]=useState(initD.getMonth());
  const handleView=useCallback((y,m)=>{setCalYear(y);setCalMonth(m)},[]);
  function handleWS(v){setWeekStart(v);spref('keva-ws',v)}
  function toggleTheme(){const n=theme==='dark'?'light':'dark';setTheme(n);spref('keva-theme',n);document.documentElement.setAttribute('data-theme',n);document.querySelector('meta[name=theme-color]').content=n==='light'?'#f8fafc':'#0a0e14'}
  function share(){navigator.clipboard.writeText(window.location.href).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)}).catch(()=>{})}

  const[teamData,setTeamData]=useState(null);const[teamLoading,setTeamLoading]=useState(true);const[showPicker,setShowPicker]=useState(false);const[showOpen,setShowOpen]=useState(false);
  function readTeams(){const qt=new URLSearchParams(window.location.search).get('teams');if(qt){const ids=qt.split(',').map(Number).filter(n=>n>0);if(ids.length)return ids}try{const j=localStorage.getItem('keva-teams');if(j)return JSON.parse(j)}catch{}return[]}
  function writeTeams(ids){try{if(ids.length)localStorage.setItem('keva-teams',JSON.stringify(ids));else localStorage.removeItem('keva-teams')}catch{}const u=new URL(window.location);if(ids.length)u.searchParams.set('teams',ids.join(','));else u.searchParams.delete('teams');window.history.replaceState(null,'',u)}
  const[myTeams,setMyTeams]=useState(readTeams);
  useEffect(()=>{fetchTeamData().then(d=>{setTeamData(d);setTeamLoading(false)}).catch(()=>setTeamLoading(false))},[]);
  function saveTeams(ids){setMyTeams(ids);writeTeams(ids)}

  // Season games for standings/schedule
  const[allSeasonGames,setAllSeasonGames]=useState(null);const seasonFetched=useRef(false);
  // Pre-load season games as soon as teams are known (from URL params or localStorage)
  useEffect(()=>{if(seasonFetched.current||!myTeams.length)return;seasonFetched.current=true;fetchAllSeasonGames().then(setAllSeasonGames).catch(()=>{})},[myTeams.length]);

  const[opSessions,setOpSessions]=useState(null);const[opLoading,setOpLoading]=useState(false);const opF=useRef(false);
  useEffect(()=>{if(opF.current)return;opF.current=true;setOpLoading(true);fetchAllOpenPlay().then(s=>{setOpSessions(s);setOpLoading(false)}).catch(()=>setOpLoading(false))},[]);
  const opDates=useMemo(()=>opSessions?new Set(opSessions.map(s=>s.date)):new Set(),[opSessions]);
  const todayOp=useMemo(()=>opSessions?opSessions.filter(s=>s.date===dateStr):[],[opSessions,dateStr]);

  const gdCache=useRef(new Map());const[gameDots,setGameDots]=useState(new Set());
  useEffect(()=>{const cells=calendarDays(calYear,calMonth,weekStart);const vb=[...new Set(cells.filter(c=>c.isVb&&!c.isPast).map(c=>c.str))];
    setGameDots(new Set(vb.filter(d=>(gdCache.current.get(d)||0)>0)));const unc=vb.filter(d=>!gdCache.current.has(d));if(!unc.length)return;let x=false;
    async function run(){const q=[...unc];while(q.length&&!x){const batch=q.splice(0,6);await Promise.all(batch.map(d=>fetchDayOpenCount(d).then(n=>gdCache.current.set(d,n)).catch(()=>gdCache.current.set(d,-1))));if(!x)setGameDots(new Set(vb.filter(d=>(gdCache.current.get(d)||0)>0)))}}run();return()=>{x=true}},[calYear,calMonth,weekStart]);

  const myTeamObjs=useMemo(()=>{if(!teamData)return[];return myTeams.map(id=>teamData.teamMap[id]).filter(Boolean)},[myTeams,teamData]);
  const myTeamIdSet=useMemo(()=>new Set(myTeams),[myTeams]);
  const teamColorMap=useMemo(()=>{const m=new Map();myTeams.forEach((id,i)=>m.set(id,i));return m},[myTeams]);
  const myTeamDateMap=useMemo(()=>{if(!myTeamObjs.length||!teamData?.seasonStart)return new Map();const map=new Map();const start=new Date(teamData.seasonStart+'T12:00:00');const end=new Date(teamData.seasonEnd+'T12:00:00');for(const t of myTeamObjs){const dn=parseDayFromLeague(t.leagueName);if(dn<0)continue;const d=new Date(start);while(d<=end){if(d.getDay()===dn){const s=ds(d);if(!map.has(s))map.set(s,[]);map.get(s).push(t.id)}d.setDate(d.getDate()+1)}}return map},[myTeamObjs,teamData]);

  const selectedDow=new Date(dateStr+'T12:00:00').getDay();const isVbDay=VB_DAYS.has(selectedDow);
  const slots=selectedDow===0?SUN_SLOTS:WKDAY_SLOTS;const myIds=mode==='myteam'&&myTeamIdSet.size>0?myTeamIdSet:null;

  const fetchDay=useCallback(()=>Promise.all([fetchGames(dateStr),fetchAllDayEvents(dateStr)]).then(([raw,allEvts])=>{
    const games=parseGames(raw);const courts=discoverCourts(games);const grid=buildGrid(games,courts,slots,myIds);
    const ct3bb=raw.some(e=>e.attributes.resource_id===3&&!e.attributes.resource_area_id&&VB_RES.includes(e.attributes.resource_id));
    const ck=new Set(courts.map(c=>c.res));const missing=[];if(!ck.has(5))missing.push('Court 1');if(!ck.has(4))missing.push('Court 2');if(!courts.some(c=>c.res===3))missing.push('Court 3');
    const vbStart=computeVbStart(allEvts,courts);setGameState({status:'ok',courts,grid,ct3bb,missing,vbStart,allGames:games,rawGames:games,updatedAt:new Date().toLocaleTimeString()})}).catch(e=>setGameState({status:'error',message:e.message})),[dateStr,myIds,slots]);

  useEffect(()=>{setGameState({status:'loading'});fetchDay();clearInterval(refreshRef.current);
    if(isToday(dateStr)){refreshRef.current=setInterval(()=>{if(!document.hidden)fetchDay()},REFRESH_MS)}
    return()=>clearInterval(refreshRef.current)},[fetchDay]);

  // Pull to refresh
  const ptrRef=useRef({startY:0,pulling:false});const[ptrShow,setPtrShow]=useState(false);
  useEffect(()=>{function ts(e){if(window.scrollY===0)ptrRef.current={startY:e.touches[0].clientY,pulling:true}}
    function tm(e){if(!ptrRef.current.pulling)return;const dy=e.touches[0].clientY-ptrRef.current.startY;if(dy>80)setPtrShow(true)}
    function te(){if(ptrShow){setPtrShow(false);fetchDay()}ptrRef.current.pulling=false}
    document.addEventListener('touchstart',ts,{passive:true});document.addEventListener('touchmove',tm,{passive:true});document.addEventListener('touchend',te,{passive:true});
    return()=>{document.removeEventListener('touchstart',ts);document.removeEventListener('touchmove',tm);document.removeEventListener('touchend',te)}},[ptrShow,fetchDay]);

  const getDots=useCallback((dateStr)=>{
    if(mode==='games')return gameDots.has(dateStr)?[getComputedStyle(document.documentElement).getPropertyValue('--open-t').trim()]:[];
    if(mode==='openplay')return opDates.has(dateStr)?[getComputedStyle(document.documentElement).getPropertyValue('--cyan-t').trim()]:[];
    const tids=myTeamDateMap.get(dateStr);if(!tids)return[];
    return tids.map(id=>{const ci=teamColorMap.get(id);return ci!==undefined?tc(ci,theme).t:'#c4b5fd'})},[mode,gameDots,opDates,myTeamDateMap,teamColorMap,theme]);

  const myGamesToday=gameState.status==='ok'?gameState.grid.rows.reduce((n,r)=>n+r.cells.filter(c=>c.myGame).length,0):0;

  return(<>
    {ptrShow&&<div className="ptr-indicator">Release to refresh...</div>}
    <div className="header"><h1>KEVA Open Courts</h1></div>
    {copied&&<div className="copied">Link copied!</div>}
    <div className="subtitle"><span>Volleyball Court Availability</span><div className="hdr-btns"><button className="icon-btn" onClick={share} title="Copy link">&#128279;</button><button className="icon-btn" onClick={toggleTheme} title="Toggle theme">{theme==='dark'?'\u2600':'\u263E'}</button></div></div>
    <ModeToggle mode={mode} onChange={setMode}/>
    <div className="cal-collapse"><button onClick={()=>setCalOpen(o=>!o)}>{calOpen?'Hide Calendar':'Show Calendar'}</button></div>
    <div className={calOpen?'':'cal collapsed'}>{calOpen&&<Calendar selected={dateStr} onSelect={d=>{setDateStr(d);setCalOpen(false)}} getDots={getDots} weekStart={weekStart} onWeekStartChange={handleWS} viewYear={calYear} viewMonth={calMonth} onViewChange={handleView}/>}</div>
    <DayNav dateStr={dateStr} onDateChange={setDateStr}/>

    {mode==='games'&&<>
      {gameState.status==='loading'&&<Loading/>}
      {gameState.status==='ok'&&<>
        <Summary openTotal={gameState.grid.openTotal} hasCourts={gameState.courts.length>0} isVbDay={isVbDay}/>
        {isVbDay&&gameState.courts.length>0&&<>
          <CourtMap/>
          <ScheduleGrid grid={gameState.grid} courts={gameState.courts} vbStart={gameState.vbStart} showNow dateStr={dateStr} rawGames={gameState.rawGames} allTeamMap={teamData?.teamMap}/>
          <Callouts grid={gameState.grid} courts={gameState.courts} vbStart={gameState.vbStart}/>
          {gameState.missing.length>0&&!gameState.ct3bb&&<div className="bb-note">{gameState.missing.join(', ')} not scheduled for volleyball tonight</div>}
          {gameState.ct3bb&&gameState.missing.filter(c=>c!=='Court 3').length>0&&<div className="bb-note">{gameState.missing.filter(c=>c!=='Court 3').join(', ')} not scheduled for volleyball tonight</div>}
          {gameState.ct3bb&&<div className="bb-note">Court 3 is basketball on Sundays</div>}</>}
        <div className="status">Live data &middot; updated {gameState.updatedAt}{isToday(dateStr)&&' &middot; auto-refresh 3m'}</div></>}
      {gameState.status==='error'&&<><div className="summary no-games">Failed to fetch schedule</div><div className="status error">Could not load &mdash; {gameState.message}</div></>}
    </>}

    {mode==='openplay'&&<>{opLoading&&<Loading/>}{opSessions&&<OpenPlayView sessions={todayOp}/>}{opSessions&&<div className="status">Live data &middot; {opSessions.length} sessions loaded</div>}</>}

    {mode==='myteam'&&<>
      {!myTeamObjs.length&&<div className="select-prompt"><p>Pick your teams to see your game schedule highlighted on the court grid</p><button className="select-btn" onClick={()=>setShowPicker(true)} disabled={teamLoading}>{teamLoading?'Loading teams...':'Select Your Teams'}</button></div>}
      {myTeamObjs.length>0&&<>
        <div className="team-banner"><div className="tb-info">{myTeamObjs.map(t=>{const ci=teamColorMap.get(t.id);const cc=ci!==undefined?tc(ci,theme):null;const rec=allSeasonGames?computeRecord(allSeasonGames,t.id):null;return<div key={t.id}><span className="tb-name" style={cc?{color:cc.t}:{}}>{t.name}</span>{' '}<span className="tb-league">{t.leagueName}</span>{rec&&<span className="tb-record">({rec.w}W-{rec.l}L)</span>}</div>})}</div>
          <button className="tb-change" onClick={()=>setShowPicker(true)}>Edit</button></div>

        <NextGameCard myTeamDateMap={myTeamDateMap} teamColorMap={teamColorMap} teamMap={teamData?.teamMap} theme={theme} dateStr={dateStr} onGo={setDateStr}/>
        {gameState.status==='loading'&&<Loading/>}
        {gameState.status==='ok'&&<>
          {isVbDay&&gameState.courts.length>0?<>
            {myGamesToday>0?<div className="summary has-my"><span className="count">Game day!</span><span className="label">{myGamesToday} game{myGamesToday>1?'s':''} on this court sheet</span></div>:<div className="summary no-games">Your team doesn't play this day</div>}
            {(()=>{const hasOpen=gameState.grid.openTotal>0;return<div className="show-open-toggle"><button className={showOpen&&hasOpen?'on':''} disabled={!hasOpen} onClick={()=>setShowOpen(o=>!o)}>{!hasOpen?'No open courts':showOpen?'Hide open courts':'Show open courts'}</button></div>})()}
            <ScheduleGrid grid={gameState.grid} courts={gameState.courts} teamMap={teamData?.teamMap} hideOpen={!showOpen} vbStart={gameState.vbStart} teamColors={teamColorMap} theme={theme} showNow dateStr={dateStr}/>
            {showOpen&&<Callouts grid={gameState.grid} courts={gameState.courts} vbStart={gameState.vbStart}/>}
          </>:<Summary openTotal={gameState.grid.openTotal} hasCourts={gameState.courts.length>0} isVbDay={isVbDay}/>}
          <div className="status">Live data &middot; updated {gameState.updatedAt}{isToday(dateStr)&&' &middot; auto-refresh 3m'}</div></>}
      </>}
    </>}

    {mode==='season'&&<>
      {!myTeamObjs.length&&<div className="select-prompt"><p>Pick your teams to see season schedule and standings</p><button className="select-btn" onClick={()=>setShowPicker(true)} disabled={teamLoading}>{teamLoading?'Loading teams...':'Select Your Teams'}</button></div>}
      {myTeamObjs.length>0&&<>
        <div className="team-banner"><div className="tb-info">{myTeamObjs.map(t=>{const ci=teamColorMap.get(t.id);const cc=ci!==undefined?tc(ci,theme):null;const rec=allSeasonGames?computeRecord(allSeasonGames,t.id):null;return<div key={t.id}><span className="tb-name" style={cc?{color:cc.t}:{}}>{t.name}</span>{' '}<span className="tb-league">{t.leagueName}</span>{rec&&<span className="tb-record">({rec.w}W-{rec.l}L)</span>}</div>})}</div>
          <button className="tb-change" onClick={()=>setShowPicker(true)}>Edit</button></div>
        {allSeasonGames?<>
          <SeasonSchedule allGames={allSeasonGames} myTeamIds={myTeamIdSet} teamMap={teamData?.teamMap||{}} teamColorMap={teamColorMap} theme={theme} onDateChange={d=>{setDateStr(d);setMode('myteam')}}/>
          <StandingsView allGames={allSeasonGames} teamMap={teamData?.teamMap||{}} myTeamObjs={myTeamObjs} myTeamIds={myTeamIdSet}/>
        </>:<Loading/>}
      </>}
    </>}

    {showPicker&&teamData&&<TeamPicker leagues={teamData.leagues} teams={teamData.teams} selectedIds={myTeams} onDone={saveTeams} onClose={()=>setShowPicker(false)}/>}
  </>)}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker'in navigator){if(new URLSearchParams(location.search).has('reset')){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));caches.keys().then(ks=>ks.forEach(k=>caches.delete(k)));const u=new URL(location);u.searchParams.delete('reset');location.replace(u)}else navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
