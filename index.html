<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Volleyball court availability, team schedules, and open play at KEVA Sports Center in Middleton, WI">
  <title>KEVA Volleyball</title>
  <link rel="preconnect" href="https://apps.daysmartrecreation.com" crossorigin />
  <link rel="dns-prefetch" href="https://apps.daysmartrecreation.com" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    /* Critical CSS — prevent FOUC and layout shift on initial paint */
    :root,[data-theme="dark"]{--bg:#0a0e14;--text:#c5cdd9;--heading:#e6ecf5;--muted:#6b7f99;--panel:#111820;--panel-b:#1e2a38}
    [data-theme="light"]{--bg:#f8fafc;--text:#475569;--heading:#0f172a;--muted:#6b7a8c;--panel:#fff;--panel-b:#e2e8f0}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:12px}
    #root{max-width:540px;margin:0 auto}
  </style>
  <script>
    (function () {
      var s = localStorage.getItem('keva-theme');
      var t = s || (window.matchMedia && window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', t);
      document.querySelector('meta[name=theme-color]').content = t === 'light' ? '#f8fafc' : '#0a0e14';
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
