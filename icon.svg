<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff8f0"/>
      <stop offset="40%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#d4c8b0"/>
    </radialGradient>
    <radialGradient id="lava1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#881100"/>
    </radialGradient>
    <radialGradient id="lava2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff66"/>
      <stop offset="50%" stop-color="#22aa44"/>
      <stop offset="100%" stop-color="#116622"/>
    </radialGradient>
    <filter id="heat">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow/heat -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#ff6633" stroke-width="4" opacity=".4" filter="url(#glow-f)"/>

  <!-- Main ball -->
  <circle cx="256" cy="256" r="230" fill="url(#glow)" stroke="#aa8866" stroke-width="3"/>

  <!-- Molten cracks - red -->
  <g fill="none" stroke-linecap="round" filter="url(#glow-f)">
    <path d="M256 28 C210 110, 195 200, 210 260 Q220 310, 256 484" stroke="url(#lava1)" stroke-width="10" opacity=".85"/>
    <path d="M256 28 C300 110, 320 200, 300 260 Q290 310, 256 484" stroke="url(#lava1)" stroke-width="10" opacity=".85"/>
    <path d="M30 215 C100 235, 200 255, 256 256 Q340 258, 482 230" stroke="url(#lava2)" stroke-width="9" opacity=".85"/>
    <path d="M38 310 C120 285, 210 270, 256 268 Q350 265, 474 295" stroke="url(#lava2)" stroke-width="9" opacity=".85"/>
  </g>

  <!-- Inner seam lines (volleyball pattern) -->
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity=".6">
    <path d="M256 28 C200 120, 200 390, 256 484"/>
    <path d="M256 28 C312 120, 312 390, 256 484"/>
    <path d="M30 215 C130 255, 380 255, 482 215"/>
    <path d="M38 310 C140 275, 370 275, 474 310"/>
    <path d="M60 100 C160 200, 256 230, 256 256"/>
    <path d="M452 100 C352 200, 256 230, 256 256"/>
  </g>

  <!-- Molten drip accents -->
  <circle cx="180" cy="160" r="12" fill="#ff4422" opacity=".5" filter="url(#glow-f)"/>
  <circle cx="330" cy="180" r="10" fill="#33dd55" opacity=".5" filter="url(#glow-f)"/>
  <circle cx="256" cy="380" r="8" fill="#ff5533" opacity=".4" filter="url(#glow-f)"/>
  <circle cx="150" cy="300" r="9" fill="#33cc55" opacity=".4" filter="url(#glow-f)"/>
  <circle cx="360" cy="320" r="7" fill="#ff4422" opacity=".35" filter="url(#glow-f)"/>

  <!-- Highlight -->
  <ellipse cx="200" cy="170" rx="60" ry="40" fill="white" opacity=".15" transform="rotate(-20,200,170)"/>
</svg>
